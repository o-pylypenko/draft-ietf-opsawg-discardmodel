name: "Check Syntax of YANG Modules"

on:
  push:
    branches:
    - main
    paths:
    - '**.yang'
  pull_request:
    paths:
    - '**.yang'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yang-lint-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: "Lint YANG Modules and Update Trees"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@v6
      with:
        token: ${{ github.token }}
        ref: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.head_ref || github.ref }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: "Install pyang"
      run: |
        python -m pip install --upgrade pip
        pip install pyang

    - name: "Setting up pyang"
      run: make pyang-setup

    - name: "Lint using pyang"
      run: make pyang-lint

    - name: "Generate YANG trees"
      run: make yang-gen-tree

    - name: "Commit and push tree files"
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      env:
        PUSH_BRANCH: ${{ github.head_ref || github.ref_name }}
      run: |
        git config user.name 'Yang Bot'
        git config user.email 'yangbot@example.com'
        git add yang/trees/*.tree
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Auto-generating yang trees"
          git push origin "HEAD:$PUSH_BRANCH"
        else
          echo "No changes to commit"
        fi
